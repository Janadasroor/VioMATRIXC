name: Build VioMATRIXC
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool \
            flex bison gcc g++ make

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool bison flex

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            autoconf automake libtool
            bison flex
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-libtool

      - name: Bootstrap
        if: runner.os != 'Windows'
        run: ./autogen.sh

      - name: Bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ./autogen.sh

      - name: Configure
        if: runner.os != 'Windows'
        run: |
          STAGING=$PWD/staging
          mkdir -p "$STAGING"
          ./configure --with-ngshared --enable-cider --enable-vicompat \
            --prefix="$STAGING"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          STAGING=$PWD/staging
          mkdir -p "$STAGING"
          ./configure --with-ngshared --enable-cider --enable-vicompat \
            --prefix="$STAGING"

      - name: Build
        if: runner.os != 'Windows'
        run: make -j$(nproc)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: mingw32-make -j$(nproc)

      - name: Install to staging dir
        if: runner.os != 'Windows'
        run: |
          make install
          # Also copy code models
          mkdir -p staging/cm
          for d in analog digital spice2poly tlines xtradev xtraevt; do
            [ -f "src/xspice/icm/$d/$d.cm" ] && \
              cp "src/xspice/icm/$d/$d.cm" staging/cm/
          done

      - name: Install to staging dir (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mingw32-make install
          # Also copy code models
          mkdir -p staging/cm
          for d in analog digital spice2poly tlines xtradev xtraevt; do
            [ -f "src/xspice/icm/$d/$d.cm" ] && \
              cp "src/xspice/icm/$d/$d.cm" staging/cm/
          done

      - name: Package tarball (Linux)
        if: runner.os == 'Linux'
        run: |
          cd staging
          tar czf ../viomatrixc-linux-x86_64.tar.gz \
            include/ lib/ cm/

      - name: Package tarball (macOS)
        if: runner.os == 'macOS'
        run: |
          cd staging
          tar czf ../viomatrixc-macos-arm64.tar.gz \
            include/ lib/ cm/

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging\* -DestinationPath viomatrixc-windows-x86_64.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: viomatrixc-linux-x86_64.tar.gz

      - name: Upload release asset (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: viomatrixc-macos-arm64.tar.gz

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: viomatrixc-windows-x86_64.zip
